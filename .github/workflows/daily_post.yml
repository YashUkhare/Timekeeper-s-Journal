name: Daily Instagram Post

on:
  schedule:
    - cron: '35 18 * * *'   # 18:35 UTC = 12:05 AM IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV }}" > .env

      - name: Run Instagram Bot
        run: python main.py --now

      - name: Commit updated files back to repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/story.xlsx
          git add pending_publish.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: daily post update [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
