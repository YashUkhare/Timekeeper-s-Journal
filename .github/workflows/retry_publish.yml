name: Retry Instagram Publish

on:
  workflow_dispatch:
    # Manual trigger only — run this from Actions tab whenever a post failed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV }}" > .env

      - name: Check pending_publish.json exists
        run: |
          if [ ! -f pending_publish.json ]; then
            echo "⚠️  No pending_publish.json found. Nothing to retry."
            exit 0
          fi
          echo "✅ Found pending_publish.json:"
          cat pending_publish.json

      - name: Retry Instagram publish only
        run: python main.py --retry

      - name: Commit updated files (story.xlsx + remove pending_publish.json)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/story.xlsx
          git rm --cached pending_publish.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: retry publish succeeded [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
